<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soteria Obfuscator</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; --success: #238636; --error: #f85149; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { width: 90%; max-width: 800px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 20px; color: var(--accent); margin: 0 0 15px 0; }
        textarea { width: 100%; height: 350px; background: #010409; color: #79c0ff; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: monospace; resize: none; box-sizing: border-box; outline: none; }
        .footer { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #obfBtn { background: var(--success); color: white; flex: 2; }
        #copyBtn { background: #30363d; color: white; flex: 1; }
        #status { margin-top: 15px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Soteria.rip Obfuscator</h1>
    <textarea id="editor" placeholder="-- Paste Luau code here..."></textarea>
    <div class="footer">
        <button id="obfBtn">Obfuscate</button>
        <button id="copyBtn">Copy</button>
    </div>
    <div id="status">Ready</div>
</div>

<script>
    const API_KEY = 'e4facd6e-f54c-44e7-8ee3-5f6b99817d0d';
    // This proxy is what stops the red CORS errors in your console
    const PROXY = 'https://corsproxy.io/?';
    const API_URL = 'https://soteria.rip/api/obfuscate';

    const editor = document.getElementById('editor');
    const obfBtn = document.getElementById('obfBtn');
    const status = document.getElementById('status');

    obfBtn.addEventListener('click', async () => {
        const code = editor.value.trim();
        if (!code) return;

        obfBtn.disabled = true;
        status.innerText = "Processing via Proxy...";
        status.style.color = "var(--accent)";

        try {
            // Using the proxy to bypass the CORS block
            const response = await fetch(PROXY + encodeURIComponent(API_URL), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': API_KEY
                },
                body: JSON.stringify({ code: code })
            });

            const data = await response.json();

            if (response.ok) {
                editor.value = data.code;
                status.innerText = "Success! Remaining Tokens: " + (data.tokens || "N/A");
                status.style.color = "var(--success)";
            } else {
                status.innerText = "API Error: " + (data.message || "Invalid Request");
                status.style.color = "var(--error)";
            }
        } catch (err) {
            status.innerText = "Connection failed. The proxy might be busy.";
            status.style.color = "var(--error)";
        } finally {
            obfBtn.disabled = false;
        }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
        editor.select();
        document.execCommand('copy');
        alert("Copied!");
    });
</script>

</body>
</html>
