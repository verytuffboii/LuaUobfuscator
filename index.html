<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Soteria Hub</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { width: 90%; max-width: 800px; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 350px; background: #010409; color: #79c0ff; border: 1px solid #30363d; padding: 12px; font-family: monospace; box-sizing: border-box; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #238636; color: white; width: 100%; margin-top: 15px; }
        #status { margin-top: 15px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2>Soteria Obfuscator</h2>
    <textarea id="editor" placeholder="Paste code here..."></textarea>
    <button id="obfBtn">Obfuscate Code</button>
    <div id="status">Ready</div>
</div>

<script>
    const obfBtn = document.getElementById('obfBtn');
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');

    obfBtn.addEventListener('click', async () => {
        const code = editor.value.trim();
        if(!code) return;

        obfBtn.disabled = true;
        status.innerText = "Processing via Vercel Backend...";

        try {
            const response = await fetch('/api/obfuscate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            });

            const data = await response.json();
            if (data.code) {
                editor.value = data.code;
                status.innerText = "✓ Success! Tokens left: " + data.tokens;
            } else {
                status.innerText = "Error: " + (data.error || "Unknown error");
            }
        } catch (err) {
            status.innerText = "Connection failed. Make sure you are on Vercel!";
        } finally { obfBtn.disabled = false; }
    });
</script>
</body>
</html>
